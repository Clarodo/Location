<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Compartir ubicación</title>
</head>

<body style="font-family:Arial; text-align:center; margin-top:80px;">

  <h2>Compartir ubicación</h2>

  <p>Presiona el botón para enviar tu ubicación por WhatsApp.</p>

  <button onclick="enviarUbicacion()" 
  style="padding:15px 25px; font-size:18px; background:#25D366; color:white; border:none; border-radius:6px;">
    Enviar ubicación
  </button>

  <script>
    function enviarUbicacion() {
      if (!navigator.geolocation) {
        alert("Tu dispositivo no permite ubicación");
        return;
      }

      navigator.geolocation.getCurrentPosition(
        function(pos) {
          const lat = pos.coords.latitude;
          const lng = pos.coords.longitude;

          const mensaje = "Mi ubicación: https://www.google.com/maps?q=" + lat + "," + lng;
          const url = "https://api.whatsapp.com/send?phone=18492202163&text=" + encodeURIComponent(mensaje);

          window.location.href = url;
        },
        function(error) {
          alert("Activa la ubicación y vuelve a intentarlo");
        }
      );
    }
  </script>

</body>
</html>
